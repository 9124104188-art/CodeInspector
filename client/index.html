<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Reviewer</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>AI Code Reviewer</h1>
      <p class="subtitle">Paste your code and receive AI-powered code reviews, explanations, and learning tips instantly.</p>

      <div class="chips">
        <span>Syntax Highlighting</span>
        <span>Bug Detection</span>
        <span>Code Quality Score</span>
        <span>Beginner Explanation</span>
      </div>
    </header>

    <form id="review-form">
      <label for="editor">Code</label>
      <div id="editor"></div>

      <label for="language">Language</label>
      <select id="language" name="language">
        <option value="python" selected>Python</option>
        <option value="javascript">JavaScript</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
      </select>

      <input type="file" id="code-file" accept=".js,.py,.java,.cpp,.c">

      <p id="char-count">0 characters • 0 lines</p>

      <div class="button-row">
        <button type="submit">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          Review Code
        </button>

        <button type="button" id="explain-btn" class="secondary-btn">
          <i class="fa-solid fa-circle-question"></i>
          Explain Code
        </button>

        <button type="button" id="copy-review" class="ghost-btn">
          <i class="fa-regular fa-clipboard"></i>
          Copy Output
        </button>
      </div>
    </form>

    <section id="output" class="output">
      <h2 id="output-title">Review Output</h2>
      <div id="review-text" class="review-text">
        <p class="empty-state">Your review or explanation will appear here.</p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
