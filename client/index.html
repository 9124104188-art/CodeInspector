<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Reviewer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <h1>AI Code Reviewer</h1>
    <form id="review-form">
        <label for="code-input" text="Code Input">Code</label>
        <textarea spellcheck = "false"  id="code-input" name="code" placeholder="Paste your code here..." rows="12"></textarea>
        <label for="language" text="Programming Language">
            Language
            <select id="language" name="language">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
            </select>
        </label>
        <button type="submit">Review Code</button>
        
    </form>
    <section id="output"></section>
    
</body>
</html>
